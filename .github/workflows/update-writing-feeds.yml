name: Update Writing Feeds

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Refresh writing feeds
        run: python scripts/update_writing_feeds.py

      - name: Commit updated feed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-writing.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi
          git commit -m "Update writing feeds"
          git push
